# PyIceberg catalog configuration for the lakehouse stack.
# Connects to LakeKeeper (Iceberg REST catalog) + S3 storage.
# S3 credentials use ${ENV_VAR} syntax, resolved at runtime by catalog.py.
# Works with both Garage (local dev) and AWS S3 (production).

catalog:
    name: lakehouse
    type: rest
    uri: http://lakekeeper:8181/catalog
    warehouse: lakehouse
    token: dummy
    s3.endpoint: http://${S3_ENDPOINT}
    s3.access-key-id: ${S3_ACCESS_KEY_ID}
    s3.secret-access-key: ${S3_SECRET_ACCESS_KEY}
    s3.region: ${S3_REGION}
    s3.path-style-access: "${S3_PATH_STYLE:-true}"
    s3.remote-signing-enabled: "false"
